name: vllm segmented-spans image build

on:
  release:
    types: [published]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version tag (e.g. v0.2.0)'
        required: true

# cancel any prior runs for this workflow and this PR (or branch)
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  RELEASE_VERSION: ${{ github.event.inputs.version || github.event.release.tag_name || 'latest' }}

jobs:
  build_and_push:
    name: build and push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Aggressive disk space cleanup
        run: ./.github/scripts/free-up-disk-space.sh

      - name: Load vllm-version config
        run: |
          source docker/vllm-version
          echo "VLLM_REPO=$VLLM_REPO" >> $GITHUB_ENV
          echo "VLLM_BRANCH=$VLLM_BRANCH" >> $GITHUB_ENV
          echo "VLLM_BASE_COMMIT=$VLLM_BASE_COMMIT" >> $GITHUB_ENV

      - name: Verify release version
        run: echo "RELEASE_VERSION=$RELEASE_VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        if: ${{ env.RELEASE_VERSION != 'latest' }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build the Container Image
        uses: docker/build-push-action@v6
        with:
          push: ${{ env.RELEASE_VERSION != 'latest' }}
          file: docker/Dockerfile.cuda
          tags: ghcr.io/almogtavor/vllm-segmented-spans-cuda:${{ env.RELEASE_VERSION }},ghcr.io/almogtavor/vllm-segmented-spans-cuda:latest
          context: .
          build-args: |
            VLLM_REPO=${{ env.VLLM_REPO }}
            VLLM_BRANCH=${{ env.VLLM_BRANCH }}
            VLLM_BASE_COMMIT=${{ env.VLLM_BASE_COMMIT }}
