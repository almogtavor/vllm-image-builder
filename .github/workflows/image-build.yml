name: vllm segmented-spans image build

on:
  release:
    types: [published]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version tag override (leave empty for auto date_hash tag)'
        required: false

# cancel any prior runs for this workflow and this PR (or branch)
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  build_and_push:
    name: build and push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Aggressive disk space cleanup
        run: ./.github/scripts/free-up-disk-space.sh

      - name: Load vllm-version config
        run: |
          source docker/vllm-version
          echo "VLLM_REPO=$VLLM_REPO" >> $GITHUB_ENV
          echo "VLLM_BRANCH=$VLLM_BRANCH" >> $GITHUB_ENV
          echo "VLLM_BASE_COMMIT=$VLLM_BASE_COMMIT" >> $GITHUB_ENV

      - name: Resolve image version from fork's latest commit
        run: |
          # If a manual version was provided, use it. Otherwise, auto-generate
          # a tag from the fork's latest commit: YYYY-MM-DD-<short-sha>
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "RELEASE_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "RELEASE_VERSION=${{ github.event.release.tag_name }}" >> $GITHUB_ENV
          else
            LATEST_SHA=$(git ls-remote "$VLLM_REPO" "refs/heads/$VLLM_BRANCH" | cut -c1-8)
            COMMIT_DATE=$(TZ=UTC date +%Y-%m-%d)
            echo "RELEASE_VERSION=${COMMIT_DATE}-${LATEST_SHA}" >> $GITHUB_ENV
          fi

      - name: Print resolved version
        run: echo "RELEASE_VERSION=$RELEASE_VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build the Container Image
        uses: docker/build-push-action@v6
        with:
          push: ${{ github.event_name != 'pull_request' }}
          file: docker/Dockerfile.cuda
          tags: ghcr.io/almogtavor/vllm-segmented-spans:${{ env.RELEASE_VERSION }},ghcr.io/almogtavor/vllm-segmented-spans:latest
          context: .
          build-args: |
            VLLM_REPO=${{ env.VLLM_REPO }}
            VLLM_BRANCH=${{ env.VLLM_BRANCH }}
            VLLM_BASE_COMMIT=${{ env.VLLM_BASE_COMMIT }}
