name: middleware image build

on:
  pull_request:
    branches: [main]
    paths:
      - 'middleware/**'
      - 'docker/Dockerfile.middleware'
      - '.github/workflows/middleware-image-build.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version tag (e.g. v0.1.0)'
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  RELEASE_VERSION: ${{ github.event.inputs.version || 'latest' }}

jobs:
  build_and_push:
    name: build and push middleware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        if: ${{ env.RELEASE_VERSION != 'latest' }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build the Container Image
        uses: docker/build-push-action@v6
        with:
          push: ${{ env.RELEASE_VERSION != 'latest' }}
          file: docker/Dockerfile.middleware
          tags: ghcr.io/almogtavor/spans-middleware:${{ env.RELEASE_VERSION }},ghcr.io/almogtavor/spans-middleware:latest
          context: .
