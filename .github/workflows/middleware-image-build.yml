name: middleware image build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version tag (e.g. v0.1.0)'
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  build_and_push:
    name: build and push middleware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build the Container Image
        uses: docker/build-push-action@v6
        with:
          push: true
          file: docker/Dockerfile.middleware
          tags: ghcr.io/almogtavor/vllm-spans-middleware:${{ github.event.inputs.version }}
          context: .
