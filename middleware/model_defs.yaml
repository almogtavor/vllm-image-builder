tulu3_block_ft:
  type: "generative"
  host: "openai"
  host_url: "http://localhost:9000/v1"
  model_id: "ldsjmdy/Tulu3-Block-FT"
  prompt_template: "<|system|>\nYou are an intelligent AI assistant.
            Please answer questions based on the user's instructions.
            Below are some reference documents that may help you in
            answering the user's question.\n
            {reference_documents}\n
            <|user|>\nPlease write a high-quality answer for the
            given question using only the provided search documents
            (some of which might be irrelevant).\nQuestion: {question}"
  context_template: " # # [{context_id}]: {document}\n\n"
  special_delim: " # # "
  system_prompt_delim: "answering the user's question.\n"
  conv_start_placeholder: "<|user|>"
  assistant_placeholder: "\n<|assistant|>\n"
  block_attention_placeholder: "[Block-Attention]"
  token_limit: 8192
  stop_sequences: []
  access_control: False
