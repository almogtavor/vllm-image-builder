llama_3_1_8b_instruct:
  type: "generative"
  host: "openai"
  "host_url": "http://localhost:9000/v1"
  model_id: "NousResearch/Meta-Llama-3.1-8B-Instruct"
  prompt_template: "<|begin_of_text|><|start_header_id|>system<|end_header_id|>\n
      You are a helpful, respectful and honest assistant. Always answer as helpfully as possible, while being safe. Your answers should not include any harmful, unethical, racist, sexist, toxic, dangerous, or illegal content. Please ensure that your responses are socially unbiased and positive in nature.\n
      If a question does not make any sense, or is not factually coherent, explain why instead of answering something not correct. If you don't know the answer to a question, please don't share false information.\n
      <|eot_id|><|start_header_id|>user<|end_header_id|>\n
      {reference_documents}\n
      [conversation]: {question}. Answer with no more than 150 words.  If you cannot base your answer on the given document, please state that you do not have an answer.<|eot_id|>\n"
  context_template: " # # [document]: {document}\n\n"
  special_delim: " # # "
  system_prompt_delim: "<|eot_id|><|start_header_id|>user<|end_header_id|>\n"
  conv_start_placeholder: "[conversation]"
  assistant_placeholder: "<|start_header_id|>assistant<|end_header_id|>\n"
  token_limit: 8192
  stop_sequences: []
  access_control: False

